# Application
spring:
  application:
    name: inventorydashboard

  # Database (PostgreSQL - Docker)
  datasource:
    url: jdbc:postgresql://postgres:5432/media
    username: postgres
    password: postgres
    driver-class-name: org.postgresql.Driver

  # JPA / Hibernate
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        "[hibernate.format_sql]": true
    database-platform: org.hibernate.dialect.PostgreSQLDialect

  # Jackson (JSON)
  jackson:
    time-zone: UTC

# Server
server:
  port: 8080

# Logging (optional but useful)
logging:
  level:
    org:
      hibernate:
        SQL: DEBUG
        type:
          descriptor:
            sql:
              BasicBinder: TRACE